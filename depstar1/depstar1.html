<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chatbot Website</title>

    <!-- CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: #fff;
        }

        header {
            padding: 20px;
            text-align: center;
            background: rgba(0,0,0,0.3);
        }

        header h1 {
            font-size: 2rem;
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
        }

        .hero h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 25px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #333;
            color: #fff;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>My AI Chatbot Website</h1>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Welcome to My Smart Chatbot 🤖</h2>
        <p>Click the chat icon at the bottom-right to start chatting!</p>
        <button class="btn" onclick="scrollToBottom()">Open Chat</button>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Website | Built with ❤️</p>
    </footer>

    <!-- JS -->
    <script>
        function scrollToBottom() {
            window.scrollTo({
                top: document.body.scrollHeight,
                behavior: 'smooth'
            });
        }
    </script>

    <!-- 🔥 Zapier Chatbot Script -->
    <script async type="module" src="https://interfaces.zapier.com/assets/web-components/zapier-interfaces/zapier-interfaces.esm.js"></script>

    <!-- 🔥 Your Chatbot Embed -->
    <zapier-interfaces-chatbot-embed 
        is-popup="true" 
        chatbot-id="cmn02qdyj0027g15pne8ji1w2">
    </zapier-interfaces-chatbot-embed>

</body>
</html>
